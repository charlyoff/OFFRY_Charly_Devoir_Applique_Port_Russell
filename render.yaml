services:
  - type: web
    name: port-russell-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SEED_ADMIN_USERNAME
        value: capitainerie
      - key: SEED_ADMIN_EMAIL
        value: admin@portrussell.local
      - key: SEED_ADMIN_PASSWORD
        sync: false

